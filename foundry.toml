[profile.default]
src = "src"
out = "out"
remappings = [
    # Core Libraries
    "forge-std/=lib/forge-std/src/",
    "account-abstraction/=lib/account-abstraction/contracts/",
    
    # EigenLayer Ecosystem
    "@eigenlayer-contracts/=lib/eigenlayer-middleware/lib/eigenlayer-contracts/",
    "@eigenlayer-middleware/=lib/eigenlayer-middleware/",
    "eigenlayer-contracts/=lib/eigenlayer-middleware/lib/eigenlayer-contracts/",
    "eigenlayer-middleware/=lib/eigenlayer-middleware/",
    
    # OpenZeppelin Ecosystem
    "@openzeppelin/contracts/=lib/eigenlayer-middleware/lib/openzeppelin-contracts/contracts/",
    "@openzeppelin-upgradeable/=lib/eigenlayer-middleware/lib/openzeppelin-contracts-upgradeable/contracts/",
    "openzeppelin-contracts/=lib/eigenlayer-middleware/lib/openzeppelin-contracts/",
    "openzeppelin-contracts-upgradeable/=lib/eigenlayer-middleware/lib/openzeppelin-contracts-upgradeable/",
    "@openzeppelin-upgrades/=lib/eigenlayer-middleware/lib/openzeppelin-contracts-upgradeable/",
    
    # Utility Mappings
    "ds-test/=lib/eigenlayer-middleware/lib/ds-test/src/",
    
    # TaaS Internal
    "taas-contract/=src/"
]

# Solidity Compiler Settings
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true

[rpc_endpoints]
sepolia = "${RPC_URL_SEPOLIA}"
holesky = "${RPC_URL_HOLESKY}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
holesky = { key = "${ETHERSCAN_API_KEY}" }
